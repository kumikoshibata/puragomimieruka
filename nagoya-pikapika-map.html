<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>なごやピカピカマップ</title>
  <style>
    :root {
      --cream: #fff7df;
      --cream-deep: #ffeebf;
      --ink: #4d4031;
      --muted: #7b6b57;
      --line: rgba(88, 64, 40, 0.18);
      --white: rgba(255, 255, 255, 0.88);
      --shadow: 0 14px 30px rgba(154, 112, 56, 0.16);
      --green: #75c99a;
      --mint: #bcebd1;
      --yellow: #ffd86b;
      --pink: #ffb9c8;
      --blue: #9ed8f2;
      --orange: #ffbd73;
      --purple: #cdb8ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 216, 107, 0.32) 0 70px, transparent 72px),
        radial-gradient(circle at 86% 18%, rgba(158, 216, 242, 0.34) 0 58px, transparent 60px),
        linear-gradient(180deg, #fff9e8 0%, var(--cream) 55%, #fff0cb 100%);
      overflow-x: hidden;
    }

    .app {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 16px 14px 28px;
      position: relative;
    }

    .bubble {
      position: fixed;
      border: 2px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.26);
      border-radius: 999px;
      pointer-events: none;
      box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.8);
      animation: floaty 8s ease-in-out infinite;
    }

    .bubble.one {
      width: 56px;
      height: 56px;
      left: 4vw;
      top: 22vh;
    }

    .bubble.two {
      width: 34px;
      height: 34px;
      right: 6vw;
      top: 54vh;
      animation-delay: -2s;
    }

    .bubble.three {
      width: 46px;
      height: 46px;
      left: 8vw;
      bottom: 8vh;
      animation-delay: -4s;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    header {
      padding: 18px 16px 14px;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.66);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 50% 50% 46% 46%;
      background: linear-gradient(180deg, #ffe47b, #ffc94b);
      border: 3px solid #fff;
      box-shadow: 0 5px 0 rgba(120, 80, 30, 0.12);
      position: relative;
      flex: 0 0 auto;
    }

    .logo::before,
    .logo::after {
      content: "";
      position: absolute;
      width: 5px;
      height: 5px;
      top: 17px;
      border-radius: 50%;
      background: #553d26;
    }

    .logo::before { left: 13px; }
    .logo::after { right: 13px; }

    .logo span {
      position: absolute;
      left: 50%;
      top: 25px;
      width: 10px;
      height: 6px;
      transform: translateX(-50%);
      border-radius: 0 0 10px 10px;
      border-bottom: 2px solid #553d26;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 7vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .progress-list {
      display: grid;
      gap: 9px;
    }

    .progress-item {
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 248, 225, 0.84);
      border: 1px solid rgba(122, 86, 42, 0.12);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 700;
      color: #5d4a35;
    }

    .progress-track {
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(122, 86, 42, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.9);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #8fdbaf, #ffe071, #ffadbe);
      transition: width 420ms ease;
    }

    .map-shell {
      margin: 16px 0 12px;
      padding: 13px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .map-shell::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 24px;
      border: 2px dashed rgba(117, 201, 154, 0.35);
      pointer-events: none;
    }

    .map-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 2px 10px;
      font-weight: 800;
    }

    .map-status small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .map {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(76px, 1fr);
      gap: 5px;
      padding: 8px;
      aspect-ratio: 0.86;
      border-radius: 28px 32px 24px 34px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.28)),
        #dff4d7;
      clip-path: polygon(20% 2%, 66% 0%, 96% 17%, 100% 60%, 79% 98%, 29% 100%, 4% 78%, 0% 25%);
      position: relative;
      isolation: isolate;
    }

    .ward {
      min-width: 0;
      min-height: 0;
      border: 0;
      padding: 0;
      border-radius: 20px 15px 22px 17px;
      color: var(--ink);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: var(--ward-color);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.82);
      transform: translateY(var(--bump, 0));
      transition: transform 180ms ease, box-shadow 220ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .ward:nth-child(3n) { border-radius: 15px 23px 16px 22px; }
    .ward:nth-child(4n) { --bump: 4px; }
    .ward:nth-child(5n) { --bump: -3px; }

    .ward:active {
      transform: translateY(var(--bump, 0)) scale(0.97);
    }

    .ward.selected {
      box-shadow:
        inset 0 0 0 3px rgba(255, 255, 255, 0.98),
        0 0 0 3px rgba(255, 210, 92, 0.7),
        0 8px 20px rgba(255, 174, 73, 0.24);
      z-index: 4;
    }

    .city {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      filter: blur(var(--blur));
      transform: scale(var(--city-scale));
      opacity: var(--city-opacity);
      transition: filter 520ms ease, transform 520ms ease, opacity 520ms ease;
    }

    .city::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 17%;
      height: 28%;
      background:
        linear-gradient(90deg, #7cc6dc 0 16%, transparent 16% 21%, #84d09c 21% 43%, transparent 43% 50%, #ffc76d 50% 68%, transparent 68% 74%, #f59fb3 74% 100%);
      border-radius: 7px 7px 12px 12px;
      opacity: 0.88;
    }

    .city::after {
      content: "";
      position: absolute;
      left: 19%;
      right: 19%;
      bottom: 11%;
      height: 12%;
      border-radius: 999px;
      background: rgba(72, 164, 104, 0.35);
    }

    .ward-name {
      position: absolute;
      left: 7px;
      top: 7px;
      z-index: 3;
      max-width: calc(100% - 14px);
      padding: 4px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.9);
      font-size: clamp(10px, 2.6vw, 12px);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rate-chip {
      position: absolute;
      right: 6px;
      bottom: 6px;
      z-index: 3;
      min-width: 34px;
      padding: 3px 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      font-size: 11px;
      font-weight: 900;
      text-align: center;
    }

    .fog {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: var(--fog);
      transition: opacity 520ms ease;
      background:
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.92) 0 8px, rgba(198, 224, 231, 0.9) 8px 16px),
        repeating-linear-gradient(-45deg, rgba(255, 232, 190, 0.65) 0 7px, rgba(255, 255, 255, 0.8) 7px 14px);
      mix-blend-mode: screen;
      backdrop-filter: blur(3px);
    }

    .mascot {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 5;
      width: min(44px, 52%);
      aspect-ratio: 1;
      transform: translate(-50%, -48%) scale(0);
      opacity: 0;
      transition: transform 360ms cubic-bezier(.2, 1.5, .4, 1), opacity 260ms ease;
    }

    .ward.complete .mascot {
      transform: translate(-50%, -48%) scale(1);
      opacity: 1;
    }

    .ward.spark::after {
      content: "";
      position: absolute;
      inset: -35%;
      z-index: 6;
      background: linear-gradient(115deg, transparent 35%, rgba(255, 255, 255, 0.9) 47%, transparent 58%);
      animation: sparkle 700ms ease-out;
      pointer-events: none;
    }

    @keyframes sparkle {
      from { transform: translateX(-70%) rotate(8deg); }
      to { transform: translateX(70%) rotate(8deg); }
    }

    .icon-shachihoko {
      border-radius: 52% 44% 50% 46%;
      background: linear-gradient(135deg, #ffe77d, #f4a927);
      border: 3px solid #fff;
      box-shadow: 0 5px 0 rgba(126, 83, 24, 0.16);
    }

    .icon-shachihoko::before {
      content: "";
      position: absolute;
      right: -5px;
      top: 7px;
      width: 18px;
      height: 26px;
      border-radius: 90% 10% 90% 10%;
      background: #ffd45b;
      transform: rotate(-25deg);
      border: 2px solid #fff;
    }

    .icon-shachihoko::after {
      content: "";
      position: absolute;
      left: 12px;
      top: 15px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #5b3a22;
      box-shadow: 12px 3px 0 -1px #5b3a22;
    }

    .icon-chick {
      border-radius: 50% 50% 46% 46%;
      background: linear-gradient(180deg, #ffe985, #ffc857);
      border: 3px solid #fff;
    }

    .icon-chick::before,
    .icon-chick::after {
      content: "";
      position: absolute;
      width: 5px;
      height: 5px;
      top: 16px;
      border-radius: 50%;
      background: #5b3a22;
    }

    .icon-chick::before { left: 13px; }
    .icon-chick::after { right: 13px; }

    .icon-gorilla {
      border-radius: 44% 44% 52% 52%;
      background: #7f7367;
      border: 3px solid #fff;
    }

    .icon-gorilla::before {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 7px;
      height: 18px;
      border-radius: 44% 44% 50% 50%;
      background: #cab9a3;
    }

    .icon-gorilla::after {
      content: "";
      position: absolute;
      left: 12px;
      top: 14px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2e271f;
      box-shadow: 15px 0 0 #2e271f;
    }

    .icon-flower {
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #ffd85e 0 20%, transparent 22%),
        radial-gradient(circle at 50% 14%, #ff9cb1 0 18%, transparent 19%),
        radial-gradient(circle at 84% 50%, #ffb0c0 0 18%, transparent 19%),
        radial-gradient(circle at 50% 86%, #ff9cb1 0 18%, transparent 19%),
        radial-gradient(circle at 16% 50%, #ffb0c0 0 18%, transparent 19%);
    }

    .icon-leaf {
      border-radius: 75% 10% 75% 10%;
      background: linear-gradient(135deg, #87d99c, #4dad76);
      border: 3px solid #fff;
      transform-origin: center;
    }

    .icon-castle {
      border-radius: 12px 12px 18px 18px;
      background: linear-gradient(180deg, #9ed8f2 0 26%, #fff 27% 60%, #75c99a 61%);
      border: 3px solid #fff;
    }

    .icon-castle::before {
      content: "";
      position: absolute;
      left: 7px;
      right: 7px;
      top: -8px;
      height: 17px;
      background: #78b7d1;
      clip-path: polygon(0 100%, 20% 0, 40% 100%, 60% 0, 80% 100%, 100% 0, 100% 100%);
    }

    .icon-star {
      background: #ffd45b;
      clip-path: polygon(50% 0%, 62% 35%, 100% 36%, 70% 58%, 80% 96%, 50% 74%, 20% 96%, 30% 58%, 0 36%, 38% 35%);
      filter: drop-shadow(0 3px 0 rgba(126, 83, 24, 0.18));
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0;
    }

    .control-button {
      min-height: 50px;
      border: 0;
      border-radius: 18px;
      color: #50391f;
      background: linear-gradient(180deg, #fff, #ffe49a);
      box-shadow: 0 7px 0 #eab958, 0 14px 20px rgba(135, 91, 28, 0.14);
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .control-button:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #eab958, 0 8px 14px rgba(135, 91, 28, 0.12);
    }

    .control-button.secondary {
      grid-column: 1 / -1;
      min-height: 42px;
      background: linear-gradient(180deg, #fff, #d7f4e0);
      box-shadow: 0 6px 0 #8ccba2, 0 12px 18px rgba(78, 132, 92, 0.12);
      font-size: 13px;
    }

    .detail {
      padding: 14px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.74);
      border: 2px solid rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow);
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .detail h2 {
      margin: 0;
      font-size: 20px;
    }

    .detail strong {
      color: #e88c4c;
      font-size: 19px;
    }

    .detail p {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .mini-track {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(122, 86, 42, 0.12);
    }

    .mini-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #9ed8f2, #75c99a, #ffd86b);
      transition: width 380ms ease;
    }

    .celebration {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      z-index: 30;
      background: rgba(255, 247, 223, 0.38);
      backdrop-filter: blur(2px);
    }

    .celebration.show {
      display: grid;
      animation: fadeIn 240ms ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .celebration-card {
      width: min(100%, 390px);
      padding: 24px 18px;
      border-radius: 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.9);
      border: 3px solid #fff;
      box-shadow: 0 24px 60px rgba(121, 82, 27, 0.24);
      position: relative;
      overflow: hidden;
    }

    .celebration-card h2 {
      margin: 0 0 8px;
      font-size: 27px;
    }

    .celebration-card p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    .confetti {
      position: fixed;
      top: -14px;
      width: 9px;
      height: 14px;
      border-radius: 4px;
      z-index: 31;
      pointer-events: none;
      animation: fall var(--fall-speed) linear forwards;
      background: var(--piece-color);
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(620deg);
        opacity: 0.2;
      }
    }

    @media (max-width: 360px) {
      .app {
        padding-inline: 10px;
      }

      .map {
        grid-auto-rows: minmax(66px, 1fr);
      }

      .ward-name {
        font-size: 10px;
        padding-inline: 5px;
      }

      .rate-chip {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <span class="bubble one"></span>
  <span class="bubble two"></span>
  <span class="bubble three"></span>

  <main class="app">
    <header>
      <div class="title-row">
        <div class="logo" aria-hidden="true"><span></span></div>
        <h1>なごやピカピカマップ</h1>
      </div>
      <p class="lead">みんなの分別が集まると、名古屋の街がふわっと晴れていくよ。</p>
      <div class="progress-list" id="cityProgress"></div>
    </header>

    <section class="map-shell" aria-label="名古屋市の分別成果マップ">
      <div class="map-status">
        <span>名古屋の晴れ度 <strong id="cityClearRate">0%</strong></span>
        <small id="completedCount">0 / 16区 ピカピカ</small>
      </div>
      <div class="map" id="map"></div>
    </section>

    <section class="controls" aria-label="分別投稿のシミュレーション">
      <button class="control-button" type="button" data-add="10">+10件の分別</button>
      <button class="control-button" type="button" data-add="100">+100件の分別</button>
      <button class="control-button secondary" type="button" id="resetButton">リセット</button>
    </section>

    <section class="detail" aria-live="polite">
      <div class="detail-top">
        <h2 id="detailName">区をタップ</h2>
        <strong id="detailRate">0%</strong>
      </div>
      <div class="mini-track"><div class="mini-fill" id="detailFill"></div></div>
      <p id="detailPosts">気になる区を選ぶと、晴れ度と投稿数が見られます。</p>
      <p id="detailMessage">分別の輪が広がるほど、街の色が見えてきます。</p>
    </section>
  </main>

  <div class="celebration" id="celebration" role="dialog" aria-modal="true" aria-labelledby="celebrationTitle">
    <div class="celebration-card">
      <h2 id="celebrationTitle">ピカピカの名古屋、完成！</h2>
      <p>16区すべてのモザイクが晴れました。みんなの分別で、街が花と緑でいっぱいです。</p>
      <button class="control-button secondary" type="button" id="celebrationClose">マップを見る</button>
    </div>
  </div>

  <script>
    const appConfig = {
      sparkleMs: 720,
      postToClearRatio: 0.55,
      burstCountForLargeButton: 8,
      progressBars: [
        {
          id: "containers",
          label: "プラスチック製容器包装の分別率",
          start: 47,
          target: 60,
          color: "linear-gradient(90deg, #8fdbaf, #ffe071)"
        },
        {
          id: "products",
          label: "プラスチック製品の分別率",
          start: 27,
          target: 30,
          color: "linear-gradient(90deg, #9ed8f2, #ffb9c8)"
        }
      ],
      wards: [
        { id: "chikusa", name: "千種区", clearRate: 0, posts: 0, mascot: "leaf", color: "#bcebd1" },
        { id: "higashi", name: "東区", clearRate: 0, posts: 0, mascot: "castle", color: "#f9d7a8" },
        { id: "kita", name: "北区", clearRate: 0, posts: 0, mascot: "flower", color: "#ffd3df" },
        { id: "nishi", name: "西区", clearRate: 0, posts: 0, mascot: "star", color: "#ffe486" },
        { id: "nakamura", name: "中村区", clearRate: 0, posts: 0, mascot: "shachihoko", color: "#ffc979" },
        { id: "naka", name: "中区", clearRate: 0, posts: 0, mascot: "castle", color: "#a8dbf1" },
        { id: "showa", name: "昭和区", clearRate: 0, posts: 0, mascot: "chick", color: "#ffe18b" },
        { id: "mizuho", name: "瑞穂区", clearRate: 0, posts: 0, mascot: "flower", color: "#ffc1ca" },
        { id: "atsuta", name: "熱田区", clearRate: 0, posts: 0, mascot: "shachihoko", color: "#ffd071" },
        { id: "nakagawa", name: "中川区", clearRate: 0, posts: 0, mascot: "leaf", color: "#a9e5bd" },
        { id: "minato", name: "港区", clearRate: 0, posts: 0, mascot: "star", color: "#9fdcf4" },
        { id: "minami", name: "南区", clearRate: 0, posts: 0, mascot: "flower", color: "#ffb9c8" },
        { id: "moriyama", name: "守山区", clearRate: 0, posts: 0, mascot: "gorilla", color: "#c8e7a6" },
        { id: "midori", name: "緑区", clearRate: 0, posts: 0, mascot: "leaf", color: "#8bd79f" },
        { id: "meito", name: "名東区", clearRate: 0, posts: 0, mascot: "chick", color: "#fff0a1" },
        { id: "tempaku", name: "天白区", clearRate: 0, posts: 0, mascot: "flower", color: "#cdb8ff" }
      ]
    };

    const mascotClass = {
      shachihoko: "icon-shachihoko",
      chick: "icon-chick",
      gorilla: "icon-gorilla",
      flower: "icon-flower",
      leaf: "icon-leaf",
      castle: "icon-castle",
      star: "icon-star"
    };

    const mapEl = document.getElementById("map");
    const cityProgressEl = document.getElementById("cityProgress");
    const cityClearRateEl = document.getElementById("cityClearRate");
    const completedCountEl = document.getElementById("completedCount");
    const detailNameEl = document.getElementById("detailName");
    const detailRateEl = document.getElementById("detailRate");
    const detailFillEl = document.getElementById("detailFill");
    const detailPostsEl = document.getElementById("detailPosts");
    const detailMessageEl = document.getElementById("detailMessage");
    const celebrationEl = document.getElementById("celebration");
    const celebrationCloseEl = document.getElementById("celebrationClose");
    const resetButtonEl = document.getElementById("resetButton");

    let selectedWardId = appConfig.wards[0].id;
    let celebrated = false;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function averageClearRate() {
      const total = appConfig.wards.reduce((sum, ward) => sum + ward.clearRate, 0);
      return Math.round(total / appConfig.wards.length);
    }

    function completedCount() {
      return appConfig.wards.filter((ward) => ward.clearRate >= 100).length;
    }

    function getMessage(ward) {
      if (ward.clearRate >= 100) return "ピカピカ達成！名物アイコンがにっこり見えるようになりました。";
      if (ward.clearRate >= 70) return "あと少し。街の色と緑がかなり見えてきました。";
      if (ward.clearRate >= 35) return "モザイクの向こうに、楽しい街並みが見えはじめています。";
      if (ward.clearRate > 0) return "小さな分別が集まって、すこし明るくなりました。";
      return "まだ霧の中。最初の分別投稿を待っています。";
    }

    function renderProgressBars() {
      cityProgressEl.innerHTML = appConfig.progressBars.map((bar) => `
        <div class="progress-item">
          <div class="progress-label">
            <span>${bar.label}</span>
            <span id="${bar.id}Value">${bar.start}% → ${bar.target}%目標</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="${bar.id}Fill" style="background:${bar.color}"></div>
          </div>
        </div>
      `).join("");
    }

    function renderMap() {
      mapEl.innerHTML = appConfig.wards.map((ward) => {
        const iconClass = mascotClass[ward.mascot] || mascotClass.star;
        return `
          <button class="ward" type="button" data-id="${ward.id}" style="--ward-color:${ward.color};">
            <span class="city" aria-hidden="true"></span>
            <span class="fog" aria-hidden="true"></span>
            <span class="ward-name">${ward.name}</span>
            <span class="mascot ${iconClass}" aria-hidden="true"></span>
            <span class="rate-chip">${ward.clearRate}%</span>
          </button>
        `;
      }).join("");
    }

    function updateWardStyles() {
      appConfig.wards.forEach((ward) => {
        const el = mapEl.querySelector(`[data-id="${ward.id}"]`);
        if (!el) return;
        const fog = clamp(0.9 - ward.clearRate / 118, 0, 0.9);
        const blur = clamp(13 - ward.clearRate / 8, 0, 13);
        const opacity = clamp(0.36 + ward.clearRate / 125, 0.36, 1);
        const scale = clamp(1.08 - ward.clearRate / 950, 1, 1.08);
        el.style.setProperty("--fog", fog.toFixed(2));
        el.style.setProperty("--blur", `${blur.toFixed(1)}px`);
        el.style.setProperty("--city-opacity", opacity.toFixed(2));
        el.style.setProperty("--city-scale", scale.toFixed(3));
        el.classList.toggle("complete", ward.clearRate >= 100);
        el.classList.toggle("selected", ward.id === selectedWardId);
        el.querySelector(".rate-chip").textContent = `${ward.clearRate}%`;
      });
    }

    function updateProgressBars() {
      const average = averageClearRate();
      cityClearRateEl.textContent = `${average}%`;
      completedCountEl.textContent = `${completedCount()} / ${appConfig.wards.length}区 ピカピカ`;

      appConfig.progressBars.forEach((bar) => {
        const current = bar.start + ((bar.target - bar.start) * average / 100);
        const fillPercent = clamp((current / bar.target) * 100, 0, 100);
        document.getElementById(`${bar.id}Value`).textContent =
          `${current.toFixed(1)}% → ${bar.target}%目標`;
        document.getElementById(`${bar.id}Fill`).style.width = `${fillPercent}%`;
      });
    }

    function updateDetail() {
      const ward = appConfig.wards.find((item) => item.id === selectedWardId) || appConfig.wards[0];
      detailNameEl.textContent = ward.name;
      detailRateEl.textContent = `${ward.clearRate}%`;
      detailFillEl.style.width = `${ward.clearRate}%`;
      detailPostsEl.textContent = `投稿数: ${ward.posts.toLocaleString("ja-JP")}件`;
      detailMessageEl.textContent = getMessage(ward);
    }

    function renderAll() {
      updateWardStyles();
      updateProgressBars();
      updateDetail();

      if (!celebrated && completedCount() === appConfig.wards.length) {
        celebrated = true;
        showCelebration();
      }
    }

    function chooseRandomWard() {
      const unfinished = appConfig.wards.filter((ward) => ward.clearRate < 100);
      const pool = unfinished.length ? unfinished : appConfig.wards;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function sparkleWard(wardId) {
      const el = mapEl.querySelector(`[data-id="${wardId}"]`);
      if (!el) return;
      el.classList.remove("spark");
      void el.offsetWidth;
      el.classList.add("spark");
      window.setTimeout(() => el.classList.remove("spark"), appConfig.sparkleMs);
    }

    function addPosts(amount) {
      const bursts = amount >= 100 ? appConfig.burstCountForLargeButton : 1;
      const postsPerBurst = Math.round(amount / bursts);

      for (let i = 0; i < bursts; i += 1) {
        const ward = chooseRandomWard();
        const bonus = amount >= 100 ? 4 + Math.floor(Math.random() * 7) : 5 + Math.floor(Math.random() * 8);
        const clearGain = Math.max(1, Math.round(postsPerBurst * appConfig.postToClearRatio + bonus));
        ward.posts += postsPerBurst;
        ward.clearRate = clamp(ward.clearRate + clearGain, 0, 100);
        selectedWardId = ward.id;
        window.setTimeout(() => sparkleWard(ward.id), i * 70);
      }

      renderAll();
    }

    function resetDemo() {
      appConfig.wards.forEach((ward) => {
        ward.clearRate = 0;
        ward.posts = 0;
      });
      selectedWardId = appConfig.wards[0].id;
      celebrated = false;
      celebrationEl.classList.remove("show");
      renderAll();
    }

    function showCelebration() {
      celebrationEl.classList.add("show");
      makeConfetti();
    }

    function makeConfetti() {
      const colors = ["#ffb9c8", "#ffd86b", "#75c99a", "#9ed8f2", "#ffbd73", "#cdb8ff"];
      for (let i = 0; i < 80; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.setProperty("--piece-color", colors[i % colors.length]);
        piece.style.setProperty("--fall-speed", `${2.4 + Math.random() * 1.8}s`);
        piece.style.transform = `rotate(${Math.random() * 180}deg)`;
        document.body.appendChild(piece);
        window.setTimeout(() => piece.remove(), 4400);
      }
    }

    function bindEvents() {
      mapEl.addEventListener("click", (event) => {
        const wardEl = event.target.closest(".ward");
        if (!wardEl) return;
        selectedWardId = wardEl.dataset.id;
        sparkleWard(selectedWardId);
        renderAll();
      });

      document.querySelectorAll("[data-add]").forEach((button) => {
        button.addEventListener("click", () => addPosts(Number(button.dataset.add)));
      });

      resetButtonEl.addEventListener("click", resetDemo);
      celebrationCloseEl.addEventListener("click", () => celebrationEl.classList.remove("show"));
      celebrationEl.addEventListener("click", (event) => {
        if (event.target === celebrationEl) celebrationEl.classList.remove("show");
      });
    }

    renderProgressBars();
    renderMap();
    bindEvents();
    renderAll();
  </script>
</body>
</html>
